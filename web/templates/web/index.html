{% extends "web/base.html" %}

{% block content %}

    <nav class="tile-grid" aria-label="Bereiche">
      <a class="nav-tile" href="{% url 'verlag' %}">
        <span class="material-symbols-outlined nav-tile-icon" aria-hidden="true">auto_stories</span>

      <a class="nav-tile" href="{% url 'shops' %}">

    </nav>

{% endblock %}
